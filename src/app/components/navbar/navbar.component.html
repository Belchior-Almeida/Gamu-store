<nav class="navbar" [class.navbar--scrolled]="scrolled">
  <div class="navbar__inner container">

    <!-- Logo -->
    <a class="navbar__brand" routerLink="/">
      <img class="navbar__logo" src="assets/images/LOGO.png" alt="Gamu Store" />
    </a>

    <!-- Desktop links -->
    <ul class="navbar__links">
      @for (link of navLinks; track link.path) {
        <li>
          <a
            [routerLink]="link.path"
            routerLinkActive="navbar__link--active"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            class="navbar__link"
          >{{ link.label }}</a>
        </li>
      }
    </ul>

    <!-- CTA Desktop -->
    <div class="navbar__actions">
      <a routerLink="/produtos">
        <p-button
          label="Ver Produtos"
          icon="pi pi-shopping-bag"
          styleClass="p-button-gamu"
          size="small"
        />
      </a>
    </div>

    <!-- Hamburger mobile -->
    <button class="navbar__hamburger" (click)="toggleMobileMenu()" aria-label="Menu">
      <i class="pi" [ngClass]="mobileMenuOpen ? 'pi-times' : 'pi-bars'"></i>
    </button>
  </div>

  <!-- Mobile dropdown inline — sem scroll, todos os links visíveis de uma vez -->
  <div class="mobile-dropdown" [class.mobile-dropdown--open]="mobileMenuOpen">
    <ul class="mobile-dropdown__links">
      @for (link of navLinks; track link.path) {
        <li>
          <a
            [routerLink]="link.path"
            routerLinkActive="mobile-dropdown__link--active"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            class="mobile-dropdown__link"
            (click)="closeMobileMenu()"
          >
            <span>{{ link.label }}</span>
            <i class="pi pi-angle-right"></i>
          </a>
        </li>
      }
    </ul>
  </div>
</nav>
